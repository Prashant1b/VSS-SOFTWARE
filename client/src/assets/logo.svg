<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 280">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@900&amp;family=Playfair+Display:ital,wght@1,700&amp;display=swap');
      .v-letter {
        font-family: 'Sora', 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
        font-weight: 900;
        font-size: 230px;
        fill: #0A2540;
      }
      .s-letter {
        font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
